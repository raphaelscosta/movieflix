version: '3.8'

services:
  db:
    image: postgres:15
    container_name: postgres-movieflix
    restart: always
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5433:5432"
  adminer:
    image: adminer
    container_name: adminer-movieflix
    restart: always
    ports:
      - "8085:8080"